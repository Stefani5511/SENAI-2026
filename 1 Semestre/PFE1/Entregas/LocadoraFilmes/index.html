<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Locadora - Filmes</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <h1>Locadora de Filmes</h1>
        <button onclick="abrirModal()">+ Novo Filme</button>
    </header>
    <main>
        <input type="text" id="filtroGenero" placeholder="Filtrar por gênero">
        <button onclick="filtrarGenero()">Filtrar</button>
        <table>
            <thead>
                <tr>
                    <th>Capa</th>
                    <th>Nome</th>
                    <th>Gênero</th>
                    <th>Ano</th>
                    <th>Classificação</th>
                    <th>Produtora</th>
                </tr>
            </thead>
            <tbody id="dados"></tbody>
        </table>
    </main>
    <!--Criar Modal-->
    <div id="modalFilme" class="modal">
        <form id="cadFil" class="modal-content">
            <h2>Novo Filme</h2>
            <input type="file" name="capa" accept="image/*">
            <input type="text" name="nome" placeholder="Nome" required>
            <input type="text" name="genero" placeholder="Genero" required>
            <input type="number" name="ano" placeholder="Ano" required>
            <input type="text" name="classificacao" placeholder="Classificacao" required>
            <input type="text" name="produtora" placeholder="Produtora" required>
            <div class="modal-buttons">
            <button type="submit">Salvar</button>
            <button type="reset" onclick="fecharModal()">Cancelar</button>
            </div>
        </form>
    </div>
    
    <script src="script.js"></script>
</body>

</html>
